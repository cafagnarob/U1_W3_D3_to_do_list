<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="./style/reset.css" />
    <style>
      body {
        background-image: url(../asset/leone-venter-VieM9BdZKFo-unsplash.jpg);
        background-repeat: no-repeat;
        background-size: cover;
        font-family: Arial, Helvetica, sans-serif;
      }

      nav button {
        background-color: transparent;
        font-size: 1.2em;
        border: 0px;
        padding: 30px;
        cursor: pointer;
      }

      a {
        text-decoration: none;
        color: black;
      }

      input {
        text-align: center;
        font-size: 1.5em;
        background-color: transparent;
        border: 0px;
        border-bottom: 1px solid black;
      }

      div button {
        font-size: 1.5em;
        cursor: pointer;
        margin: 0px 30px;
        padding: 0px 20px;
      }

      h1 {
        font-size: 2em;
        font-weight: bold;
        font-family: "Monsieur La Doulaise", cursive;
        font-weight: 400;
        font-style: normal;
        margin: 20px;
      }

      #notebook {
        background-image: url(../asset/notebook-background-1459-x-1600-m07w2vkkolr4yi49.png);
      }
    </style>
  </head>
  <body>
    <h1>La mia rubrica</h1>
    <nav class="buttonNav">
      <button><a href="#">Home</a></button>
      <button><a href="#">To Do List</a></button>
    </nav>
    <main>
      <form id="new-activity-form">
        <div>
          <input type="text" id="activity" placeholder="Attività" />
          <button>Salva</button>
        </div>
      </form>
    </main>
    <section id="notebook">
      <div id="saved-activity"></div>
    </section>
    <footer></footer>
    <script>
      const formSubmitFn = function (e) {
        e.preventDefault()
        const activityInput = document.getElementById("activity")
        const activity = activityInput.value
        const card = document.createElement("article")
        card.classList.add("activity-card")
        const section = document.getElementById("saved-activity")
        section.innerHTML += `<article class="contact-card">
            <p>${activity} </p>
            <button onclick="deleteCard(event)">🗑️</button>
        </article>`
        form.reset()
      }

      const deleteCard = function (e) {
        const button = e.target
        const article = button.parentElement
        article.remove()
      }

      const form = document.getElementById("new-activity-form")
      form.addEventListener("submit", formSubmitFn)
    </script>
  </body>
</html>
